<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixel AI Agency Office</title>
    <link rel="stylesheet" href="./office-game.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-layout">
        <aside class="side-panel">
          <div class="brand-block">
            <p class="eyebrow">Codex prompt lab</p>
            <h1>Changwoo Prompt Agency</h1>
          </div>

          <label for="requestInput">창우 사장의 과제</label>
          <textarea id="requestInput" rows="7">SwiftUI로 macOS용 지뢰찾기 게임을 만들고 싶어. Codex에 넣을 좋은 작업 프롬프트를 만들어줘.</textarea>

          <div class="button-row">
            <button id="startButton" type="button">Start</button>
            <button id="resetButton" class="secondary" type="button">Reset</button>
          </div>

          <aside class="artifact-panel" id="artifactPanel">
            <div class="panel-head">
              <button id="artifactToggle" class="artifact-toggle" type="button" aria-expanded="true">
                <span>Artifacts</span>
                <strong id="artifactCount">0/6</strong>
              </button>
            </div>
            <div class="artifact-tabs">
              <button class="artifact-tab active" data-artifact="log">Log</button>
              <button class="artifact-tab" data-artifact="brief">Brief</button>
              <button class="artifact-tab" data-artifact="plan">Plan</button>
              <button class="artifact-tab" data-artifact="design">UX</button>
              <button class="artifact-tab" data-artifact="dev">Prompt</button>
              <button class="artifact-tab" data-artifact="final">Final</button>
            </div>
            <pre id="artifactOutput">아직 실행 전입니다.</pre>
          </aside>
        </aside>

        <section class="office-wrap">
          <div class="hud">
            <div>
              <span>Status</span>
              <strong id="statusText">Idle</strong>
            </div>
            <div>
              <span>Current task</span>
              <strong id="taskText">Waiting for request</strong>
            </div>
            <details class="team-drawer">
              <summary>Team</summary>
              <div class="team-drawer-body">
                <section class="team-list" aria-label="AI agents">
                  <button class="team-member" type="button" data-agent-card="changwoo">
                    <span class="swatch boss"></span>
                    <span>
                      <strong>창우</strong>
                      <small>Boss</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="mike">
                    <span class="swatch pm"></span>
                    <span>
                      <strong>Mike</strong>
                      <small>PM</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="mina">
                    <span class="swatch design"></span>
                    <span>
                      <strong>Mina</strong>
                      <small>UX Planner</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="jay">
                    <span class="swatch dev"></span>
                    <span>
                      <strong>Jay</strong>
                      <small>Tech Writer</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="yuna">
                    <span class="swatch review"></span>
                    <span>
                      <strong>Yuna</strong>
                      <small>QA Reviewer</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="nora">
                    <span class="swatch scope"></span>
                    <span>
                      <strong>Nora</strong>
                      <small>Scope</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="dana">
                    <span class="swatch dx"></span>
                    <span>
                      <strong>Dana</strong>
                      <small>DX</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="testkim">
                    <span class="swatch qa"></span>
                    <span>
                      <strong>Test Kim</strong>
                      <small>QA</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="jason">
                    <span class="swatch redteam"></span>
                    <span>
                      <strong>Jason</strong>
                      <small>Red Team</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="sana">
                    <span class="swatch security"></span>
                    <span>
                      <strong>Sana</strong>
                      <small>Security</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="iris">
                    <span class="swatch editor"></span>
                    <span>
                      <strong>Iris</strong>
                      <small>Editor</small>
                    </span>
                  </button>
                  <button class="team-member" type="button" data-agent-card="vera">
                    <span class="swatch judge"></span>
                    <span>
                      <strong>Vera</strong>
                      <small>Judge</small>
                    </span>
                  </button>
                </section>
                <form class="agent-chat" id="agentChatForm">
                  <label for="agentQuestion">직원에게 질문</label>
                  <textarea id="agentQuestion" rows="3">Dana DX의 역할이 뭔가요?</textarea>
                  <button id="askAgentButton" type="submit">Ask <span id="selectedAgentLabel">Dana</span></button>
                </form>
                <pre class="agent-answer" id="agentAnswer">팀원을 클릭하면 그 직원에게 질문할 수 있습니다.</pre>
              </div>
            </details>
          </div>

          <div class="office-map" id="officeMap" aria-label="Pixel office map">
            <div class="room boss-room">
              <span>Boss</span>
            </div>
            <div class="room planning-room">
              <span>Planning</span>
            </div>
            <div class="room design-room">
              <span>Design</span>
            </div>
            <div class="room dev-room">
              <span>Dev</span>
            </div>
            <div class="room review-room">
              <span>Review</span>
            </div>
            <div class="room ops-room">
              <span>Ops</span>
            </div>

            <div class="desk desk-boss"></div>
            <div class="desk desk-pm"></div>
            <div class="desk desk-design"></div>
            <div class="desk desk-dev"></div>
            <div class="desk desk-review"></div>
            <div class="desk desk-scope"></div>
            <div class="desk desk-dx"></div>
            <div class="desk desk-qa"></div>
            <div class="desk desk-redteam"></div>
            <div class="desk desk-security"></div>
            <div class="desk desk-editor"></div>
            <div class="desk desk-judge"></div>
            <div class="meeting-table"></div>
            <div class="rug rug-meeting"></div>
            <div class="bookshelf bookshelf-left"></div>
            <div class="bookshelf bookshelf-right"></div>
            <div class="whiteboard whiteboard-main">SCORE</div>
            <div class="sofa sofa-lounge"></div>
            <div class="water-cooler"></div>
            <div class="plant plant-a"></div>
            <div class="plant plant-b"></div>
            <div class="plant plant-c"></div>
            <div class="plant plant-d"></div>
            <div class="plant plant-e"></div>
            <div class="plant plant-f"></div>
            <div class="delivery-box" id="deliveryBox">OUT</div>

            <div class="paper request-paper" id="requestPaper">TASK</div>
            <div class="paper brief-paper" id="briefPaper">BRF</div>
            <div class="paper draft-paper" id="draftPaper">CHK</div>
            <div class="paper final-paper" id="finalPaper">PRM</div>

            <div class="agent boss-agent" data-agent="changwoo">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>창우</strong>
            </div>
            <div class="agent pm-agent" data-agent="mike">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Mike</strong>
            </div>
            <div class="agent design-agent" data-agent="mina">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Mina</strong>
            </div>
            <div class="agent dev-agent" data-agent="jay">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Jay</strong>
            </div>
            <div class="agent review-agent" data-agent="yuna">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Yuna</strong>
            </div>
            <div class="agent scope-agent" data-agent="nora">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Nora</strong>
            </div>
            <div class="agent dx-agent" data-agent="dana">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Dana</strong>
            </div>
            <div class="agent qa-agent" data-agent="testkim">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Test</strong>
            </div>
            <div class="agent redteam-agent" data-agent="jason">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Jason</strong>
            </div>
            <div class="agent security-agent" data-agent="sana">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Sana</strong>
            </div>
            <div class="agent editor-agent" data-agent="iris">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Iris</strong>
            </div>
            <div class="agent judge-agent" data-agent="vera">
              <div class="speech"></div>
              <div class="sprite"><span></span></div>
              <strong>Vera</strong>
            </div>
          </div>
        </section>

      </section>
    </main>

    <script src="./office-game.js"></script>
  </body>
</html>
